repos:
  - repo: local
    hooks:
      - id: lint-fix
        name: npm lint (fix)
        entry: bash -c "npm run lint:fix"
        language: system
        pass_filenames: true

      - id: lint-check
        name: npm lint (check)
        entry: bash -c "npm run lint:check"
        language: system
        pass_filenames: true

      - id: format
        name: npm format
        entry: bash -c "npm run format"
        language: system
        pass_filenames: true