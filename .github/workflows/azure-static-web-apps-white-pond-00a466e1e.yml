name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - CI/CD
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - CI/CD

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend workspace
        run: npm run build --workspace react-frontend

      - name: Verify output exists
        run: ls -la packages/react-frontend/dist

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_POND_00A466E1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "packages/react-frontend/dist"
          output_location: ""
          skip_app_build: true
          api_location: ""