name: CI Testing

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        services:
            mongo:
                image: mongo:6
                ports:
                    - 27017:27017

        env:
            MONGO_URI_TEST: mongodb://localhost:27017/test

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - run: npm run lint:check

            - run: npm run test
