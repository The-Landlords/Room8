# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push: # all branches
  pull_request: # all prs
permissions:
  contents: write #This is required for actions/checkout to push back changes from lint and format fix
jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: node -v
    - run: npm -v
    - name: Install dependencies
      run: npm install 
    # change to npm ci
    - name: Run lint
      run: npm run lint:fix # will not change files
    - name: Run format
      run: npm run format:fix # will not change files
    - name: Run tests
      run: npm run test:mock
    - name: Commit changes if any from lint and format fix
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add -A

        if ! git diff --cached --quiet; then
          git commit -m "chore: auto-fix lint"
          git push
        fi

