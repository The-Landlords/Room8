name: CI Testing

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        services:
            mongo:
                image: mongo:6
                ports:
                    - 27017:27017

        env:
            MONGO_URI_TEST: mongodb://localhost:27017/test

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - run: npm run lint:check

            - name: Generate backend coverage
              run: npm run coverage:backend -- --coverageDirectory=coverage/backend --coverageReporters=text --coverageReporters=html --coverageReporters=clover --coverageReporters=json

            - name: Generate frontend coverage
              run: npm run coverage:frontend -- --coverage.reportsDirectory=coverage/frontend

            - name: Prepare coverage site
              run: |
                  mkdir -p coverage-site
                  touch coverage-site/.nojekyll

                  cp -R coverage/frontend coverage-site/frontend

                  if [ -f coverage/backend/index.html ]; then
                      cp -R coverage/backend coverage-site/backend
                  elif [ -f coverage/backend/lcov-report/index.html ]; then
                      cp -R coverage/backend/lcov-report coverage-site/backend
                  else
                      echo "Backend coverage HTML report was not found"
                      find coverage/backend -maxdepth 3 -type f | sort
                      exit 1
                  fi

                  cat > coverage-site/index.html <<'EOF'
                  <!doctype html>
                  <html lang="en">
                      <head>
                          <meta charset="utf-8" />
                          <meta name="viewport" content="width=device-width, initial-scale=1" />
                          <title>Room8 Coverage</title>
                          <style>
                              body {
                                  margin: 0;
                                  min-height: 100vh;
                                  display: grid;
                                  place-items: center;
                                  font-family:
                                      Inter, ui-sans-serif, system-ui, -apple-system,
                                      BlinkMacSystemFont, "Segoe UI", sans-serif;
                                  background: #f7ffe3;
                                  color: #2f3a32;
                              }

                              main {
                                  width: min(720px, calc(100% - 32px));
                              }

                              h1 {
                                  margin: 0 0 8px;
                                  font-size: 2rem;
                              }

                              p {
                                  margin: 0 0 24px;
                                  line-height: 1.5;
                              }

                              .reports {
                                  display: grid;
                                  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                                  gap: 16px;
                              }

                              a {
                                  display: block;
                                  padding: 20px;
                                  border: 2px solid #96c3e3;
                                  border-radius: 8px;
                                  background: white;
                                  color: #2f3a32;
                                  text-decoration: none;
                                  font-weight: 700;
                              }

                              a:hover {
                                  border-color: #5f9fc8;
                              }
                          </style>
                      </head>
                      <body>
                          <main>
                              <h1>Room8 Coverage</h1>
                              <p>Coverage reports generated by the latest successful CI run on main.</p>
                              <div class="reports">
                                  <a href="./frontend/index.html">Frontend Coverage</a>
                                  <a href="./backend/index.html">Backend Coverage</a>
                              </div>
                          </main>
                      </body>
                  </html>
                  EOF

            - uses: actions/upload-artifact@v4
              with:
                  name: coverage-reports
                  path: coverage-site

            - uses: actions/configure-pages@v5
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'

            - uses: actions/upload-pages-artifact@v3
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              with:
                  path: coverage-site

    deploy-coverage:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs: build
        runs-on: ubuntu-latest

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
