# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Azure Web App CD (backend only)

run-name: "Backend CD · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches:
      - CI/CD # FIXME change to main for production before merging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
          mongo:
            image: mongo:6
            ports:
              - 27017:27017
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
      - name: Install deps, run tests and build in packages/express_backend
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/test
        run: | 
          npm ci
          npm run test:backend --if-present
          npm run build --if-present
        working-directory: packages/express_backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: packages/express_backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: packages/express_backend
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'room8'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: packages/express_backend