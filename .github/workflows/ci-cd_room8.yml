# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Azure Web App CD (backend only)

on:
  push:
    branches:
      - CI/CD # FIXME change to main for production before merging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # env:
    #   MONGO_URI_TEST: ${{ secrets.MONGO_URI_TEST }}
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
      - name: Install deps, run testsm and build in packages/express_backend
        run: | 
          npm install  --workspaces=false
          npm run test:mock --if-present
          npm run build --if-present
        working-directory: packages/express_backend
        # change to npm ci

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: packages/express_backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: packages/express_backend
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'room8'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: packages/express_backend