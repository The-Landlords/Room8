name: Azure Web App CD (backend only)

run-name: "Backend CD · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches:
      - CI/CD # FIXME change to main for production before merging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test backend
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/test
        run: npm -w packages/express_backend run test --if-present

      - name: Build backend
        run: npm -w packages/express_backend run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            packages/express_backend/dist
            packages/express_backend/package.json
            packages/express_backend/package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: packages/express_backend

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "room8"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: packages/express_backend