name: Codex PR Review
run-name: "Codex review · PR #${{ github.event.pull_request.number }} by @${{ github.actor }}"

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: codex-pr-review-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    codex_review:
        name: Generate Codex review
        runs-on: ubuntu-latest
        if: >
            !github.event.pull_request.draft &&
            github.event.pull_request.head.repo.full_name == github.repository

        permissions:
            contents: read
            pull-requests: write
            issues: write

        outputs:
            final_message: ${{ steps.run_codex.outputs.final-message }}

        services:
            mongo:
                image: mongo:6
                ports:
                    - 27017:27017

        steps:
            - name: Checkout PR merge commit
              uses: actions/checkout@v4
              with:
                  ref: refs/pull/${{ github.event.pull_request.number }}/merge
                  fetch-depth: 0
                  persist-credentials: false

            - name: Fetch PR base branch
              run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}"

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.20.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Verify OpenAI API key
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: |
                  if [ -z "$OPENAI_API_KEY" ]; then
                    echo "OPENAI_API_KEY is not configured. Add it as a repository or organization secret."
                    exit 1
                  fi

            - name: Run Codex review
              id: run_codex
              uses: openai/codex-action@v1
              env:
                  MONGO_URI_TEST: mongodb://localhost:27017/test
                  PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
                  PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              with:
                  openai-api-key: ${{ secrets.OPENAI_API_KEY }}
                  prompt-file: .github/codex/prompts/review.md
                  output-file: codex-review.md
                  safety-strategy: drop-sudo
                  sandbox: workspace-write

    post_feedback:
        name: Post Codex review
        runs-on: ubuntu-latest
        needs: codex_review
        if: needs.codex_review.outputs.final_message != ''

        permissions:
            issues: write
            pull-requests: read

        steps:
            - name: Upsert Codex PR comment
              uses: actions/github-script@v7
              env:
                  CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
              with:
                  github-token: ${{ github.token }}
                  script: |
                      const marker = '<!-- codex-pr-review -->';
                      const maxBodyLength = 65000;
                      const rawBody = process.env.CODEX_FINAL_MESSAGE || '';
                      const reviewBody =
                        rawBody.length > maxBodyLength
                          ? `${rawBody.slice(0, maxBodyLength)}\n\n_Review truncated because it exceeded the GitHub comment size limit._`
                          : rawBody;
                      const body = `${marker}\n${reviewBody}`;

                      const { owner, repo } = context.repo;
                      const issue_number = context.payload.pull_request.number;
                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number,
                        per_page: 100,
                      });

                      const existingComment = comments.find((comment) =>
                        comment.user.type === 'Bot' && comment.body?.startsWith(marker)
                      );

                      if (existingComment) {
                        await github.rest.issues.updateComment({
                          owner,
                          repo,
                          comment_id: existingComment.id,
                          body,
                        });
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number,
                        body,
                      });
